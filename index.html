    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.id || !data.name) {
            throw new Error('无效的组织架构数据');
          }
          pushUndo();
          orgData = data;
          // Update id counter
          let maxId = 0;
          function findMaxId(n) {
            const match = n.id.match(/node-(\d+)/);
            if (match && parseInt(match[1]) > maxId) maxId = parseInt(match[1]);
            for (const child of n.children || []) findMaxId(child);
          }
          findMaxId(orgData);
          idCounter = maxId + 1;
          
          selectedNodeId = null;
          render();
          showToast('导入成功，共 ' + countNodes(orgData) + ' 个节点', 'success');
        } catch (err) {
          showToast('导入失败：' + err.message, 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ============ EXPORT ============
    function getExportCardColor(depth, nodeColor) {
      // Custom color override for non-root, non-blue nodes
      if (depth > 0 && nodeColor && nodeColor !== 'blue') {
        const colors = {
          green: '#14b8a6',
          purple: '#8b5cf6',
          orange: '#f97316',
          red: '#ef4444',
          teal: '#06b6d4',
        };
        return colors[nodeColor] || '#2b5f8a';
      }
      // Default level-based colors
      if (depth === 0) return '#2b5f8a';
      if (depth === 1) return '#2b5f8a';
      if (depth === 2) return '#3a7bbf';
      return '#4a8fc9';
    }

    function exportPNG() {
      showToast('正在生成图片...', 'success');
      
      const inner = document.getElementById('canvasInner');
      const container = document.getElementById('canvasContainer');
      const linesSvg = document.getElementById('linesSvg');
      
      // Save & reset transform so we measure canvas-space coordinates
      const origTransform = inner.style.transform;
      const origOrigin = inner.style.transformOrigin;
      inner.style.transform = 'none';
      inner.style.transformOrigin = '0 0';
      
      // Force synchronous reflow — CRITICAL for accurate measurements
      void inner.offsetHeight;
      void container.offsetHeight;
      
      // Use SVG's bounding rect as origin — SVG is at (0,0) relative to the padding edge,
      // and its coordinates match the d3 layout positions (node._x, node._y).
      const svgRect = linesSvg.getBoundingClientRect();
      const originX = svgRect.left;
      const originY = svgRect.top;
      
      // ---- Collect all node card positions (canvas-space) ----
      const nodes = [];
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      
      inner.querySelectorAll('.org-node').forEach(el => {
        const card = el.querySelector('.node-card');
        if (!card) return;
        
        const cr = card.getBoundingClientRect();
        const cx = cr.left - originX;
        const cy = cr.top - originY;
        const cw = cr.width;
        const ch = cr.height;
        
        // Determine card color from data attributes (not computed style)
        const depth = parseInt(el.dataset.depth) || 0;
        const nodeColor = el.dataset.color || 'blue';
        const bg = getExportCardColor(depth, nodeColor);
        
        nodes.push({ cx, cy, cw, ch, bg,
          name: (el.querySelector('.node-name')?.textContent || ''),
          manager: (el.querySelector('.node-manager')?.textContent || ''),
          count: (el.querySelector('.node-count')?.textContent || ''),
        });
        
        minX = Math.min(minX, cx);
        minY = Math.min(minY, cy);
        maxX = Math.max(maxX, cx + cw);
        maxY = Math.max(maxY, cy + ch);
      });
      
      // Expand by SVG line extents (SVG is also in canvas space)
      linesSvg.querySelectorAll('path').forEach(p => {
        const d = p.getAttribute('d');
        const nums = d.match(/[\d.]+/g);
        if (!nums) return;
        for (let i = 0; i < nums.length; i += 2) {
          if (i + 1 < nums.length) {
            minX = Math.min(minX, parseFloat(nums[i]));
            minY = Math.min(minY, parseFloat(nums[i+1]));
            maxX = Math.max(maxX, parseFloat(nums[i]));
            maxY = Math.max(maxY, parseFloat(nums[i+1]));
          }
        }
      });
      
      // Restore transform NOW (before async operations)
      inner.style.transform = origTransform;
      inner.style.transformOrigin = origOrigin;
      
      const P = 100;
      const W = Math.max(800, Math.ceil(maxX - minX + P * 2));
      const H = Math.max(600, Math.ceil(maxY - minY + P * 2));
      const offX = -minX + P;
      const offY = -minY + P;
      const scale = 2;
      
      // ---- Build export SVG ----
      const ns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('xmlns', ns);
      svg.setAttribute('width', W);
      svg.setAttribute('height', H);
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      
      // Background
      const bgRect = document.createElementNS(ns, 'rect');
      bgRect.setAttribute('width', W);
      bgRect.setAttribute('height', H);
      bgRect.setAttribute('fill', '#f0f2f5');
      svg.appendChild(bgRect);
      
      // Grid dots
      const gridG = document.createElementNS(ns, 'g');
      gridG.setAttribute('fill', '#dde3ed');
      for (let gx = 0; gx < W; gx += 24) {
        for (let gy = 0; gy < H; gy += 24) {
          const dot = document.createElementNS(ns, 'circle');
          dot.setAttribute('cx', gx);
          dot.setAttribute('cy', gy);
          dot.setAttribute('r', '0.5');
          gridG.appendChild(dot);
        }
      }
      svg.appendChild(gridG);
      
      // Connection lines
      const lineG = document.createElementNS(ns, 'g');
      lineG.setAttribute('transform', `translate(${offX}, ${offY})`);
      lineG.setAttribute('stroke', '#3b6eb0');
      lineG.setAttribute('stroke-width', '2.5');
      lineG.setAttribute('fill', 'none');
      lineG.setAttribute('stroke-linecap', 'round');
      lineG.setAttribute('stroke-linejoin', 'round');
      lineG.setAttribute('opacity', '0.75');
      linesSvg.querySelectorAll('path').forEach(p => {
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', p.getAttribute('d'));
        lineG.appendChild(path);
      });
      svg.appendChild(lineG);
      
      // Node cards
      const cardG = document.createElementNS(ns, 'g');
      cardG.setAttribute('transform', `translate(${offX}, ${offY})`);
      
      // Drop-shadow filter
      const defs = document.createElementNS(ns, 'defs');
      const filter = document.createElementNS(ns, 'filter');
      filter.setAttribute('id', 'cardShadow');
      filter.setAttribute('x', '-20%');
      filter.setAttribute('y', '-20%');
      filter.setAttribute('width', '140%');
      filter.setAttribute('height', '160%');
      const feDrop = document.createElementNS(ns, 'feDropShadow');
      feDrop.setAttribute('dx', '0');
      feDrop.setAttribute('dy', '6');
      feDrop.setAttribute('stdDeviation', '6');
      feDrop.setAttribute('flood-color', 'rgba(0,0,0,0.12)');
      filter.appendChild(feDrop);
      defs.appendChild(filter);
      svg.appendChild(defs);
      
      nodes.forEach(n => {
        const r = 10;
        
        // Card rect
        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('x', n.cx);
        rect.setAttribute('y', n.cy);
        rect.setAttribute('width', n.cw);
        rect.setAttribute('height', n.ch);
        rect.setAttribute('rx', r);
        rect.setAttribute('ry', r);
        rect.setAttribute('fill', n.bg);
        rect.setAttribute('filter', 'url(#cardShadow)');
        cardG.appendChild(rect);
        
        const hasExtra = n.manager || n.count;
        
        // Name text
        const nameTxt = document.createElementNS(ns, 'text');
        nameTxt.setAttribute('x', n.cx + n.cw / 2);
        nameTxt.setAttribute('y', hasExtra ? n.cy + n.ch * 0.35 : n.cy + n.ch / 2);
        nameTxt.setAttribute('text-anchor', 'middle');
        nameTxt.setAttribute('dominant-baseline', 'central');
        nameTxt.setAttribute('fill', 'white');
        nameTxt.setAttribute('font-size', '14');
        nameTxt.setAttribute('font-weight', '600');
        nameTxt.setAttribute('font-family', '-apple-system,"PingFang SC","Microsoft YaHei",sans-serif');
        nameTxt.textContent = n.name;
        cardG.appendChild(nameTxt);
        
        // Manager
        if (n.manager) {
          const mgr = document.createElementNS(ns, 'text');
          mgr.setAttribute('x', n.cx + n.cw / 2);
          mgr.setAttribute('y', n.cy + n.ch * 0.68);
          mgr.setAttribute('text-anchor', 'middle');
          mgr.setAttribute('dominant-baseline', 'central');
          mgr.setAttribute('fill', 'rgba(255,255,255,0.7)');
          mgr.setAttribute('font-size', '11');
          mgr.setAttribute('font-family', '-apple-system,"PingFang SC","Microsoft YaHei",sans-serif');
          mgr.textContent = n.manager;
          cardG.appendChild(mgr);
        }
        
        // Count badge
        if (n.count) {
          const bx = n.cx + n.cw - 8;
          const by = n.cy - 8;
          const circle = document.createElementNS(ns, 'circle');
          circle.setAttribute('cx', bx);
          circle.setAttribute('cy', by);
          circle.setAttribute('r', '13');
          circle.setAttribute('fill', '#ef4444');
          cardG.appendChild(circle);
          
          const bt = document.createElementNS(ns, 'text');
          bt.setAttribute('x', bx);
          bt.setAttribute('y', by);
          bt.setAttribute('text-anchor', 'middle');
          bt.setAttribute('dominant-baseline', 'central');
          bt.setAttribute('fill', 'white');
          bt.setAttribute('font-size', '11');
          bt.setAttribute('font-weight', 'bold');
          bt.setAttribute('font-family', '-apple-system,sans-serif');
          bt.textContent = n.count;
          cardG.appendChild(bt);
        }
      });
      
      svg.appendChild(cardG);
      
      // ---- Convert SVG → Canvas → PNG download ----
      const svgString = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      
      const img = new Image();
      img.onload = function() {
        const outCanvas = document.createElement('canvas');
        outCanvas.width = W * scale;
        outCanvas.height = H * scale;
        const outCtx = outCanvas.getContext('2d');
        outCtx.drawImage(img, 0, 0, W * scale, H * scale);
        URL.revokeObjectURL(url);
        
        outCanvas.toBlob(function(pngBlob) {
          const pngUrl = URL.createObjectURL(pngBlob);
          const a = document.createElement('a');
          a.href = pngUrl;
          a.download = '组织架构图_' + new Date().toISOString().slice(0, 10) + '.png';
          a.click();
          URL.revokeObjectURL(pngUrl);
          showToast('图片已导出', 'success');
        });
      };
      img.onerror = function() {
        URL.revokeObjectURL(url);
        showToast('导出失败，请重试', 'error');
      };
      img.src = url;
    }

    // ============ ZOOM & PAN ============
    function zoomIn() {
      zoomLevel = Math.min(2.5, zoomLevel + 0.1);
      applyTransform();
    }

    function zoomOut() {
      zoomLevel = Math.max(0.3, zoomLevel - 0.1);
      applyTransform();
    }

    function zoomReset() {
      zoomLevel = 1;
      panX = 0;
      panY = 0;
      applyTransform();
    }

    function fitToScreen() {
      // Calculate bounds
      const inner = document.getElementById('canvasInner');
      let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
      inner.querySelectorAll('.org-node').forEach(el => {
        minX = Math.min(minX, el.offsetLeft);
        minY = Math.min(minY, el.offsetTop);
        maxX = Math.max(maxX, el.offsetLeft + el.offsetWidth);
        maxY = Math.max(maxY, el.offsetTop + el.offsetHeight);
      });

      const contentW = maxX - minX + 100;
      const contentH = maxY - minY + 100;
      const container = document.getElementById('canvasScroll');
      const containerW = container.clientWidth;
      const containerH = container.clientHeight;

      const scaleX = containerW / contentW;
      const scaleY = containerH / contentH;
      zoomLevel = Math.min(scaleX, scaleY, 1.5);
      
      panX = (containerW - contentW * zoomLevel) / 2 - minX * zoomLevel + 50 * zoomLevel;
      panY = (containerH - contentH * zoomLevel) / 2 - minY * zoomLevel + 50 * zoomLevel;

      applyTransform();
    }

    function changeLayout(layout) {
      // Apply layout to all nodes recursively
      function setLayout(node) {
        node._layout = layout;
        for (const child of node.children || []) setLayout(child);
      }
      setLayout(orgData);
      selectedNodeId = null;
      render();
      setTimeout(fitToScreen, 100);
      const names = { tree: '全部树形', left: '全部左展', right: '全部右展' };
      showToast('已切换为' + (names[layout] || layout), 'success');
    }

    // ============ MOUSE EVENTS ============
    const canvasContainer = document.getElementById('canvasContainer');

    canvasContainer.addEventListener('mousedown', (e) => {
      if (e.target.closest('.org-node') || e.target.closest('.context-menu') || e.target.closest('.modal-overlay')) {
        return;
      }
      isPanning = true;
      startPanX = panX;
      startPanY = panY;
      startMouseX = e.clientX;
      startMouseY = e.clientY;
      canvasContainer.classList.add('dragging');
      hideContextMenu();
      selectedNodeId = null;
      render();
    });

    window.addEventListener('mousemove', (e) => {
      // Node drag-to-move (locked to same depth line, horizontal only)
      if (isDraggingNode && selectedNodeId) {
        const node = findNode(orgData, selectedNodeId);
        if (node) {
          const dx = (e.clientX - dragStartX) / zoomLevel;
          // Apply offset to the dragged node and all its descendants
          const currentX = nodeStartX + dx;
          const deltaX = currentX - (node._offsetX || 0);
          shiftOffsets(node, deltaX);
          render();
        }
        return;
      }
      // Canvas pan
      if (!isPanning) return;
      panX = startPanX + (e.clientX - startMouseX);
      panY = startPanY + (e.clientY - startMouseY);
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      if (isDraggingNode) {
        isDraggingNode = false;
        // Restore cursor
        if (selectedNodeId && nodeElements.has(selectedNodeId)) {
          nodeElements.get(selectedNodeId).style.cursor = '';
        }
        return;
      }
      isPanning = false;
      canvasContainer.classList.remove('dragging');
    });

    canvasContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.05 : 0.05;
      zoomLevel = Math.max(0.3, Math.min(2.5, zoomLevel + delta));

      // Zoom to cursor
      const rect = canvasContainer.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      
      const newZoom = zoomLevel;
      const oldZoom = zoomLevel - delta;
      
      panX = mx - (mx - panX) * (newZoom / oldZoom);
      panY = my - (my - panY) * (newZoom / oldZoom);
      
      applyTransform();
    }, { passive: false });

    // Click outside to close context menu
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.context-menu')) {
        hideContextMenu();
      }
    });

    // Modal click outside to close
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) {
        closeModal();
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      
      switch (e.key) {
        case 'z':
        case 'Z':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            if (e.shiftKey) redo(); else undo();
          }
          break;
        case 'y':
        case 'Y':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            redo();
          }
          break;
        case 'Delete':
        case 'Backspace':
          if (selectedNodeId) deleteNodeById(selectedNodeId);
          break;
        case 'Escape':
          selectedNodeId = null;
          render();
          hideContextMenu();
          break;
        case 'F2':
          if (selectedNodeId) editNode(selectedNodeId);
          break;
        case 'Enter':
          if (selectedNodeId) editNode(selectedNodeId);
          break;
        case 'n':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            if (selectedNodeId) addChild(selectedNodeId);
            else addRootNode();
          }
          break;
        case 's':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            exportJSON();
          }
          break;
        case '0':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            zoomReset();
          }
          break;
        case '=':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            zoomIn();
          }
          break;
        case '-':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            zoomOut();
          }
          break;
      }
    });

    // Match node click to open edit directly on Enter
    document.getElementById('editName').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveNode();
      if (e.key === 'Escape') closeModal();
    });

    // ============ TOAST ============
    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // ============ START ============
    init();

    // Fit to screen after render
    setTimeout(fitToScreen, 200);

    // Resize handler
    window.addEventListener('resize', () => {
      // Just re-render if needed
    });

    console.log('🏢 组织架构图编辑器已就绪');
    console.log('  - 点击选中节点，双击或按 Enter 编辑');
    console.log('  - 右键节点打开操作菜单');
    console.log('  - Ctrl+N 添加子部门');
    console.log('  - Delete 删除选中节点');
    console.log('  - 鼠标滚轮缩放，拖拽空白区域平移');
    console.log('  - Ctrl+S 导出JSON');
  </script>
</body>
</html>
